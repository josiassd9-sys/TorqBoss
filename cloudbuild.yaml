steps:
  # 1. Build da imagem Docker — VITE_API_BASE é passada como build-arg
  #    para que o `npm run build` interno do Dockerfile a receba corretamente
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_BASE=${_VITE_API_BASE}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/torqboss:$COMMIT_SHA'
      - '.'

  # 4. Push da imagem para o Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/torqboss:$COMMIT_SHA'

  # 5. Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'torqboss'
      - '--image'
      - 'gcr.io/$PROJECT_ID/torqboss:$COMMIT_SHA'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'VITE_API_BASE=${_VITE_API_BASE}'

# Valores padrão das substituições (podem ser sobrescritos no trigger do Cloud Build)
substitutions:
  _VITE_API_BASE: 'https://torqboss-140585498523.southamerica-east1.run.app'

options:
  logging: CLOUD_LOGGING_ONLY
